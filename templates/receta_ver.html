{% extends "base.html" %}
{% block title %}{{ receta.titulo or 'Sin título' }} — Mi Apartamento{% endblock %}
{% block content %}

<div class="page-topbar">
  <form method="POST" action="/recetas/{{ receta.id }}/borrar">
    <button type="submit" class="topbar-btn topbar-btn-danger" title="Borrar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
  </form>
</div>

<div class="page-icon">🍳</div>
<h1 class="page-title" id="r-titulo" contenteditable="true" spellcheck="false"
    style="outline:none; cursor:text;">{{ receta.titulo or 'Sin título' }}</h1>

<div style="margin-bottom:32px;">
  <span style="font-size:12px; color:rgba(55,53,47,0.4);">{{ receta.fecha_modificacion[:10] if receta.fecha_modificacion else '' }}</span>
</div>

<div id="editor-wrap">
  <textarea id="editor-contenido">{{ receta.contenido }}</textarea>
</div>

<form id="form-guardar" method="POST" action="/recetas/{{ receta.id }}/editar" style="display:none;" data-no-fetch>
  <input type="hidden" name="titulo"    id="f-titulo">
  <input type="hidden" name="contenido" id="f-contenido">
</form>

{% endblock %}
{% block scripts %}
<link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
<style>
  .EasyMDEContainer .CodeMirror { font-family: ui-sans-serif, -apple-system, sans-serif; font-size: 15px; line-height: 1.7; border: none; border-radius: 0; background: transparent; color: #37352f; padding: 0; min-height: 300px; box-shadow: none; }
  .EasyMDEContainer .CodeMirror.CodeMirror-focused { box-shadow: none; }
  .EasyMDEContainer .editor-toolbar { border: none; border-bottom: 1px solid rgba(55,53,47,0.09); border-radius: 0; background: transparent; opacity: 1; padding: 2px 0; margin-bottom: 16px; }
  .EasyMDEContainer .editor-toolbar button { color: rgba(55,53,47,0.5) !important; border-radius: 3px; }
  .EasyMDEContainer .editor-toolbar button:hover, .EasyMDEContainer .editor-toolbar button.active { background: rgba(55,53,47,0.08) !important; border-color: transparent !important; }
  .EasyMDEContainer .editor-toolbar i.separator { border-color: rgba(55,53,47,0.12); }
  .EasyMDEContainer .editor-preview { font-family: ui-sans-serif, -apple-system, sans-serif; font-size: 15px; color: #37352f; background: #fff; padding: 0 4px; line-height: 1.7; }
  #r-titulo:empty:before { content: 'Sin título'; color: rgba(55,53,47,0.3); }
</style>
<script>
const mde = new EasyMDE({
  element: document.getElementById('editor-contenido'),
  spellChecker: false,
  toolbar: ['bold','italic','heading','|','unordered-list','ordered-list','|','link','quote','code','|','preview'],
  status: false,
  autosave: { enabled: false },
});
mde.togglePreview();

async function guardar() {
  const fd = new FormData();
  fd.append('titulo', document.getElementById('r-titulo').innerText.trim());
  fd.append('contenido', mde.value());
  try {
    await fetch(document.getElementById('form-guardar').action, {
      method: 'POST', body: fd,
      headers: { 'X-Requested-With': 'fetch' },
    });
    if (window.recargarSidebar) window.recargarSidebar();
  } catch(e) {}
}

document.getElementById('r-titulo').addEventListener('blur', guardar);
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); guardar(); }
});
window.addEventListener('beforeunload', () => {
  const fd = new FormData();
  fd.append('titulo', document.getElementById('r-titulo').innerText.trim());
  fd.append('contenido', mde.value());
  fetch(document.getElementById('form-guardar').action, {
    method: 'POST', body: fd, keepalive: true,
    headers: { 'X-Requested-With': 'fetch' },
  });
});
</script>
{% endblock %}
