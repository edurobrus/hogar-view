<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f6f3; color: #37352f; }
    nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 12px 20px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
    nav a { text-decoration: none; color: #37352f; font-size: 14px; font-weight: 500; padding: 4px 10px; border-radius: 4px; }
    nav a:hover, nav a.active { background: #f0f0ef; }
    nav .brand { font-weight: 700; font-size: 15px; margin-right: 10px; }
    main { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
    h1 { font-size: 22px; margin-bottom: 24px; }
    footer { text-align: center; padding: 20px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">🏠 Mi Hogar</span>
    <a href="{{ site.baseurl }}/">Inicio</a>
    <a href="{{ site.baseurl }}/tareas/">Tareas</a>
    <a href="{{ site.baseurl }}/eventos/">Eventos</a>
    <a href="{{ site.baseurl }}/recetas/">Recetas</a>
    <a href="{{ site.baseurl }}/limpieza/">Limpieza</a>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>Vétraz-Monthoux · Junio–Julio 2026</footer>
</body>
</html>
